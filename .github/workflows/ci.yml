name: ci

on:
  push:
  pull_request:

env:
  ZIG_VERSION: 0.16.0
  NUKLEAR_COMMIT: 2667d0a19a8251f780d3326bcbda265a8d060ed4

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig build test

  cmpdump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Fetch Nuklear reference
        run: |
          git clone --filter=blob:none https://github.com/Immediate-Mode-UI/Nuklear tools/cmpdump/nuklear
          git -C tools/cmpdump/nuklear checkout "$NUKLEAR_COMMIT"
      - run: ./compare.sh
        working-directory: tools/cmpdump

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig fmt --check .

  docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig build docs
      - uses: actions/upload-pages-artifact@v5
        with:
          path: zig-out/docs
      - id: deploy
        uses: actions/deploy-pages@v5
